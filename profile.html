<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Skill Bridge — Profile</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- Mobile Sidebar Overlay -->
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <!-- TOP NAVIGATION BAR -->
  <header class="top-navbar" style="position: sticky; top: 0; z-index: 50;">
    <!-- Left: Brand -->
    <a href="home.html" class="navbar-brand">
      <div class="logo-mark">SB</div>
      SkillBridge
    </a>

    <!-- Center: Navigation Links -->
    <nav class="navbar-links" id="navbar-links">
      <a class="nav-item" href="home.html">Home</a>
      <a class="nav-item" href="customer-dashboard.html">Overview</a>
      <a class="nav-item" href="listing.html">Categories</a>
      <a class="nav-item" href="customer-dashboard.html">My Bookings</a>
    </nav>

    <!-- Right: Mobile Hamburger & Profile -->
    <div class="navbar-actions">
      <!-- Notification Bell -->
      <div class="notification-bell" onclick="location.href='customer-dashboard.html'" style="cursor:pointer">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <div class="bell-badge"></div>
      </div>

      <!-- Profile Dropdown -->
      <div class="profile-dropdown-container">
        <div class="profile-trigger" id="profile-trigger">
          <img src="https://i.pravatar.cc/150?img=68" class="user-avatar" alt="Avatar">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>

        <!-- Dropdown Menu -->
        <div class="profile-menu" id="profile-menu">
          <div class="dropdown-header">
            <div class="dropdown-name">Alex Johnson</div>
            <div class="dropdown-role">Customer Account</div>
          </div>
          <a class="dropdown-item" href="customer-dashboard.html">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            My Profile
          </a>
          <a class="dropdown-item" href="index.html" style="color: #ef4444;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Log Out
          </a>
        </div>
      </div>

      <!-- Mobile Hamburger Toggle -->
      <button class="mobile-toggle" id="mobile-toggle">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>
  </header>
  <main style="max-width: 1440px; width: 100%; margin: 24px auto 64px auto; padding: 0 24px; min-height: 100vh;">
    <!-- Filled dynamically by app.js -->
    <div id="profile-container">
      <!-- Loading State -->
      <div style="padding:40px; text-align:center; width:100%; color:var(--muted);">
        Loading profile...
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
