<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Skill Bridge — Workers</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>
  <!-- Mobile Sidebar Overlay -->
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <!-- TOP NAVIGATION BAR -->
  <header class="top-navbar" style="position: sticky; top: 0; z-index: 50;">
    <!-- Left: Brand -->
    <a href="home.html" class="navbar-brand">
      <div class="logo-mark">SB</div>
      SkillBridge
    </a>

    <!-- Center: Navigation Links -->
    <nav class="navbar-links" id="navbar-links">
      <a class="nav-item" href="home.html">Home</a>
      <a class="nav-item" href="customer-dashboard.html">Overview</a>
      <a class="nav-item active" href="listing.html">Categories</a>
      <a class="nav-item" href="customer-dashboard.html">My Bookings</a>
    </nav>

    <!-- Right: Mobile Hamburger & Profile -->
    <div class="navbar-actions">
      <!-- Notification Bell -->
      <div class="notification-bell" onclick="location.href='customer-dashboard.html'" style="cursor:pointer">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <div class="bell-badge"></div>
      </div>

      <!-- Profile Dropdown -->
      <div class="profile-dropdown-container">
        <div class="profile-trigger" id="profile-trigger">
          <img src="https://i.pravatar.cc/150?img=68" class="user-avatar" alt="Avatar">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>

        <!-- Dropdown Menu -->
        <div class="profile-menu" id="profile-menu">
          <div class="dropdown-header">
            <div class="dropdown-name">Eshaal Hussain</div>
            <div class="dropdown-role">Customer Account</div>
          </div>
          <a class="dropdown-item" href="customer-dashboard.html">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            My Profile
          </a>
          <a class="dropdown-item" href="index.html" style="color: #ef4444;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Log Out
          </a>
        </div>
      </div>

      <!-- Mobile Hamburger Toggle -->
      <button class="mobile-toggle" id="mobile-toggle">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </header>

  <main class="wrap">
    <section class="card" style="max-width:1100px;width:100%;">
      <div class="layout">
        <aside class="filters" id="filters-aside">
          <h3 style="margin-top:0;margin-bottom:16px;font-size:20px;">Filters</h3>

          <!-- Category Filter -->
          <div style="margin-bottom:20px;">
            <label style="font-weight:600;display:block;margin-bottom:10px;">Category</label>
            <div style="display:flex;flex-direction:column;gap:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="filter-category" value="All" checked
                  style="accent-color:var(--primary);width:16px;height:16px;"> All Categories
              </label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="filter-category" value="Plumber"
                  style="accent-color:var(--primary);width:16px;height:16px;"> Plumber
              </label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="filter-category" value="Electrician"
                  style="accent-color:var(--primary);width:16px;height:16px;"> Electrician
              </label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="filter-category" value="Carpenter"
                  style="accent-color:var(--primary);width:16px;height:16px;"> Carpenter
              </label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="filter-category" value="Mechanic"
                  style="accent-color:var(--primary);width:16px;height:16px;"> Mechanic
              </label>
            </div>
          </div>

          <!-- Price Filter -->
          <div style="margin-bottom:20px;">
            <label style="font-weight:600;display:block;margin-bottom:10px;">Max Hourly Rate: $<span
                id="price-display">100</span></label>
            <input type="range" id="filter-price" min="10" max="100" value="100"
              style="width:100%;accent-color:var(--primary);">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px;">
              <span>$10</span><span>$100</span>
            </div>
          </div>

          <!-- Availability Filter -->
          <div style="margin-bottom:20px;">
            <label style="font-weight:600;display:block;margin-bottom:10px;">Availability</label>
            <select id="filter-availability" class="modern-input"
              style="padding:10px; width:100%; border-radius:8px; border:1px solid var(--border);">
              <option value="All">Any Time</option>
              <option value="Today">Available Today</option>
              <option value="Tomorrow">Available Tomorrow</option>
              <option value="Weekend">Available This Weekend</option>
            </select>
          </div>

          <!-- Minimum Rating -->
          <div style="margin-bottom:20px;">
            <label style="font-weight:600;display:block;margin-bottom:10px;">Minimum Rating</label>
            <select id="filter-rating" class="modern-input"
              style="padding:10px; width:100%; border-radius:8px; border:1px solid var(--border);">
              <option value="0">Any Rating</option>
              <option value="4.0">â­ 4.0 & Up</option>
              <option value="4.5">â­ 4.5 & Up</option>
              <option value="4.8">â­ 4.8 & Up (Top Pros)</option>
            </select>
          </div>

          <!-- Experience Filter -->
          <div style="margin-bottom:20px;">
            <label style="font-weight:600;display:block;margin-bottom:10px;">Experience Level</label>
            <select id="filter-experience" class="modern-input"
              style="padding:10px; width:100%; border-radius:8px; border:1px solid var(--border);">
              <option value="All">Any Experience</option>
              <option value="1-3">1-3 Years (Apprentice)</option>
              <option value="4-7">4-7 Years (Experienced)</option>
              <option value="8">8+ Years (Master)</option>
            </select>
          </div>

          <!-- Location Filter -->
          <div style="margin-bottom:20px;">
            <label style="font-weight:600;display:block;margin-bottom:10px;">Location</label>
            <div style="display:flex;gap:8px;">
              <input type="text" id="filter-location" class="modern-input" placeholder="e.g. Lahore"
                style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);">
            </div>
          </div>

          <!-- Verified Switch -->
          <div style="margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;">
            <label style="font-weight:600;margin:0;cursor:pointer;" for="filter-verified">Verified Pros Only</label>
            <!-- A makeshift toggle switch markup -->
            <label class="toggle-switch" style="position:relative;display:inline-block;width:40px;height:24px;">
              <input type="checkbox" id="filter-verified" style="opacity:0;width:0;height:0;">
              <span
                style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:24px;"
                id="verified-slider"></span>
              <span
                style="position:absolute;content:'';height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%;"
                id="verified-knob"></span>
            </label>
            <style>
              #filter-verified:checked+#verified-slider {
                background-color: var(--primary);
              }

              #filter-verified:checked~#verified-knob {
                transform: translateX(16px);
              }
            </style>
          </div>

          <!-- Sort -->
          <div style="margin-bottom:20px;border-top:1px solid var(--border);padding-top:20px;">
            <label style="font-weight:600;display:block;margin-bottom:10px;">Sort By</label>
            <select id="filter-sort" class="modern-input"
              style="padding:10px; width:100%; border-radius:8px; border:1px solid var(--border);">
              <option value="rating">Rating (Highest)</option>
              <option value="experience">Experience (Highest)</option>
              <option value="price_low">Price (Lowest)</option>
              <option value="price_high">Price (Highest)</option>
            </select>
          </div>

          <div style="margin-top:24px;">
            <button class="btn outline" id="clear-filters" style="width:100%; border-radius:8px; padding:10px;">Clear
              Filters</button>
          </div>
        </aside>

        <div>
          <h1 id="listing-title" class="title">Available workers</h1>
          <div id="workers-list" style="display:flex;flex-direction:column;"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="dashboard.js"></script>
  <script src="footer.js"></script>
</body>

</html>
