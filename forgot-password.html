<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SkillBridge — Forgot Password</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <!-- Split Auth Layout -->
  <main class="auth-split">
    <!-- Left panel decorative image (Hidden on mobile) -->
    <div class="auth-panel-img" style="background-image: url('https://images.unsplash.com/photo-1541888086925-0c1a01b1fc56?q=80&w=1200&auto=format&fit=crop');" aria-hidden="true"></div>

    <!-- Right panel login form -->
    <div class="auth-panel-form">
      <div class="auth-card">
        <!-- Back Link -->
        <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-weight:600;margin-bottom:24px;font-size:14px">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to Login
        </a>

        <h1 style="margin:0 0 8px;font-size:32px;letter-spacing:-0.5px">Reset Password</h1>
        <p class="muted" style="margin-bottom:32px;font-size:15px">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

        <form id="reset-form" onsubmit="alert('Reset link sent to your email!'); location.href='index.html'; return false;">
          <!-- Email Input -->
          <div class="input-group">
            <label class="input-label" for="email">Email Address</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              <input class="modern-input" id="email" type="email" placeholder="Enter your email" required>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn gradient" style="padding:14px;font-size:16px;margin-top:12px">Send Reset Link</button>
        </form>

      </div>
    </div>
  </main>

  <script src="footer.js"></script>
</body>
</html>
